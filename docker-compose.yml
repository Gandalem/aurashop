version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_DATABASE: aura
      MYSQL_ROOT_PASSWORD: 1234
    ports:
      - "3306:3306"

  redis:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"

  backend:
    build:
      context: .          # 현재 폴더(my-project)에서 Dockerfile 찾음
      dockerfile: Dockerfile
    container_name: spring-backend
    depends_on:
      - db
      - redis
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/aura
      - SPRING_DATA_REDIS_HOST=redis
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend # frontend 폴더 내부에서 Dockerfile 찾음
    container_name: react-frontend
    ports:
      - "80:80"
    depends_on:
      - backend